<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Payoo | Home</title>

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-300 mx-auto">

    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-100 z-10">
        <section class="w-11/12 max-auto py-3 flex justify-between items-center">
            <div class="left flex">
                <div class=" w-[60px] p-3">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2>$ <span class="text-2xl font-bold" id="balance">45000</span> <br> balance</h2>
                </div>
            </div>

            <div class="right">
                <a href="index.html" class="btn rounded-xl"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>

    <section class="py-10">
        <div class="w-11/12 mx-auto py-3">
            <h1 class="text-3xl font-bold">Welcome to Pay<span class="text-blue-500">oo</span></h1>
            <br>
            <p>Enjoy easy and convenient financial services with us.<br>Cashout charge is low and</p>
        </div>

       
        <div class="card-container w-11/12 mx-auto py-3 grid grid-cols-3 gap-4">
            <button onclick="showonly('Add-money')" class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>

            <button onclick="showonly('cashout')" class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>

            <button onclick="showonly('Transfer-Money')"
                class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>

            <button onclick="showonly('get-bonus')" class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>

            <button onclick="showonly('pay-bill')" class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>

            <button onclick="showonly('transactions')"
                class="btn h-full py-4 btn-soft btn-primary flex-col items-center">
                <img class="w-[20px] h-[20px]" src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    
    <section id="Add-money" class="w-11/12 mx-auto py-5">
        <h1 class="font-bold text-2xl">Add Money</h1>

        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm mx-auto rounded-3xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-black">Select A Bank</label>
                        <select id="select-bank" class="select w-full max-w-xs rounded-2xl">
                            <option disabled selected>Select Bank</option>
                            <option>Dhaka Bank</option>
                            <option>UCB Bank</option>
                            <option>Islami bank</option>
                        </select>

                        <label class="label font-bold text-black">Bank Account Number</label>
                        <input id="add-agent" type="text" maxlength="11" class="input rounded-2xl"
                            placeholder="Enter 11digit Number" />

                        <label class="label font-bold text-black mt-1">Amount to Add</label>
                        <input id="add-amount" type="number" class="input rounded-2xl"
                            placeholder="Enter amount to add" />

                        <label class="label font-bold text-black mt-1">4 Digit Pin</label>
                        <input id="add-pin" type="password" maxlength="4" class="input rounded-2xl"
                            placeholder="Enter 4 Digit Pin" />

                        <button type="button" id="add-money-btn" class="btn btn-primary mt-4 rounded-2xl">Add
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

   
    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h1 class="font-bold text-2xl">Cash Out</h1>

        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm mx-auto rounded-3xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-black">Agent Number</label>
                        <input id="cash-agent" type="text" maxlength="11" class="input rounded-2xl"
                            placeholder="Enter 11digit Number" />

                        <label class="label font-bold text-black mt-1">Amount</label>
                        <input id="cash-amount" type="number" class="input rounded-2xl"
                            placeholder="Enter amount to withdraw" />

                        <label class="label font-bold text-black mt-1">4 Digit Pin</label>
                        <input id="cash-pin" type="password" maxlength="4" class="input rounded-2xl"
                            placeholder="Enter 4 Digit Pin" />

                        <button type="button" id="cashout-btn" class="btn btn-primary mt-4 rounded-2xl">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    
    <section id="Transfer-Money" class="w-11/12 mx-auto py-5 hidden">
        <h1 class="font-bold text-2xl">Transfer Money</h1>

        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm mx-auto rounded-3xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-black">User Account Number</label>
                        <input id="transfer-user" type="text" maxlength="11" class="input rounded-2xl"
                            placeholder="Enter 11digit Number" />

                        <label class="label font-bold text-black mt-1">Amount</label>
                        <input id="transfer-amount" type="number" class="input rounded-2xl"
                            placeholder="Enter amount to transfer" />

                        <label class="label font-bold text-black mt-1">4 Digit Pin</label>
                        <input id="transfer-pin" type="password" maxlength="4" class="input rounded-2xl"
                            placeholder="Enter 4 Digit Pin" />

                        <button type="button" id="transfer-money-btn" class="btn btn-primary mt-4 rounded-2xl">Send
                            Now</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    
    <section id="get-bonus" class="w-11/12 mx-auto py-5 hidden">
        <h1 class="font-bold text-2xl">Get Bonus</h1>

        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm mx-auto rounded-3xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-black">Enter Bonus Coupon</label>
                        <input id="bonus-coupon" type="text" class="input rounded-2xl"
                            placeholder="Enter Bonus Coupon" />

                        <button type="button" id="get-bonus-btn" class="btn btn-primary mt-4 rounded-2xl">Get
                            Bonus</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

   
    <section id="pay-bill" class="w-11/12 mx-auto py-5 hidden">
        <h1 class="font-bold text-2xl">Pay Bill</h1>

        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm mx-auto rounded-3xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-black">Select to pay</label>
                        <select id="pay-select" class="select w-full max-w-xs rounded-2xl">
                            <option disabled selected>Select Bank</option>
                            <option>Dhaka Bank</option>
                            <option>UCB Bank</option>
                            <option>Islami bank</option>
                        </select>

                        <label class="label font-bold text-black">Biller Account Number</label>
                        <input id="bill-account" type="text" maxlength="11" class="input rounded-2xl"
                            placeholder="Enter Account Number" />

                        <label class="label font-bold text-black mt-1">Amount to pay</label>
                        <input id="bill-amount" type="number" class="input rounded-2xl"
                            placeholder="Enter amount to pay" />

                        <label class="label font-bold text-black mt-1">4 Digit Pin</label>
                        <input id="bill-pin" type="password" maxlength="4" class="input rounded-2xl"
                            placeholder="Enter 4 Digit Pin" />

                        <button type="button" id="pay-bill-btn" class="btn btn-primary mt-4 rounded-2xl">Pay
                            Bill</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

   
    <section id="transactions" class="w-11/12 mx-auto py-5 hidden">
        <h1 class="font-bold text-2xl">Transactions</h1>
        <div id="transactions-list" class="mt-4">
            <p class="opacity-70">No transactions yet.</p>
        </div>
    </section>

    
    <script src="./script/machine.js"></script>
    <script src="./script/addmoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/transfer.js"></script>
    <script src="./script/bonus.js"></script>
    <script src="./script/paybill.js"></script>

</body>

</html>
