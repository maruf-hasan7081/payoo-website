<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-300 mx-auto">


    <div class="logo w-[200px] mx-auto pt-32">
        <img src="./assets/Logo-full.png" alt="">
    </div>

    <div class="form pt-10 ">
        <div class="card bg-base-100 w-full max-w-sm   mx-auto rounded-3xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold text-black">Mobile Number</label>
                    <input id="input-mobilenumner" type="text" maxlength="11" minlength="11" class="input rounded-2xl"
                        placeholder="Enter your Number" />
                    <label class="label font-bold text-black mt-1">4 Digit Pin</label>
                    <input id="input-pin" type="password" maxlength="4" minlength="4" class="input rounded-2xl"
                        placeholder="Enter 4 Digit Pin" />

                    <button id="btn-id" class="btn btn-primary mt-4 rounded-2xl">Login</button>
                </fieldset>
            </div>
        </div>
    </div>


    <script src="./script/login.js"></script>





</body>

</html>
